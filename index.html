<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>自來水接管大挑戰</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="player" style="display:none;"></div>
    <div id="lobby-screen" class="lobby-container">
        <header class="lobby-header">
            <h1>FIGHTING TO WRA</h1>
            <p>完成所有關卡獲得獎品</p>
        </header>
        <div id="welcome-overlay" class="welcome-overlay hidden">
            <div class="welcome-content">
                <div class="welcome-logo">🎯</div>
                <h2>歡迎來到自來水數位大挑戰！</h2>
                <p class="welcome-text">
                    有趣的數位探險啟程囉！遊戲好玩具知識性，等你來挑戰！歡迎民眾踴躍參與，成功通過兩大關卡，就能立即申請精美破關獎品！
                </p>
                <div class="welcome-btn-zone">
                    <button id="btn-start-game" class="btn primary-welcome-btn">開始闖關</button>
                    <button id="btn-show-rules" class="btn rules-btn">活動辦法</button>
                </div>
            </div>
        </div>
        <div class="map-perspective-wrapper">
            <div class="pingtung-map-3d">
                <svg id="pingtung-svg" class="map-svg" viewBox="0 0 200 400"></svg>
                <div class="map-pin pin-pipe" id="pin-pipe-node" style="top: 30%; left: 45%;">
                    <div class="pin-pulse" id="pulse-pipe"></div>
                    <div class="pin-card" id="btn-goto-pipe">
                        <span class="pin-icon">🔧</span>
                        <div class="pin-info">
                            <h3>接水管大作戰<span id="badge-pipe" class="status-badge"></span></h3>
                            <p id="desc-pipe"></p>
                        </div>
                    </div>
                </div>
                <div class="map-pin pin-quiz" id="pin-quiz-node" style="top: 80%; left: 75%;">
                    <div class="pin-pulse" id="pulse-quiz"></div>
                    <div class="pin-card" id="btn-goto-quiz">
                        <span class="pin-icon">❓</span>
                        <div class="pin-info">
                            <h3>自來水大挑戰<span id="badge-quiz" class="status-badge"></span></h3>
                            <p id="desc-quiz"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-pipe-screen" class="game-screen hidden">
        <button class="back-to-lobby btn">⬅ 返回地圖</button>
        <div class="game-container">
            <header class="game-header">
                <h1>PIPE REPAIR</h1>
                <div class="stats-panel">
                    <div class="stat-box">步數: <span id="move-count">0</span></div>
                    <div class="stat-box">時間: <span id="timer">00:00</span></div>
                </div>
            </header>
            <div id="game-board" class="game-board"></div>
        </div>
    </div>
    <div id="game-quiz-screen" class="game-screen hidden">
        <button class="back-to-lobby btn">⬅ 返回地圖</button>
        <div class="quiz-container">
            <div class="quiz-card">
                <div class="quiz-header">
                    <h2>自來水問答王</h2>
                    <div class="quiz-progress">問題: <span id="quiz-current"></span> / <span id="quiz-total"></span></div>
                </div>
                <h3 id="quiz-question">讀取中...</h3>
                <div id="quiz-options" class="quiz-options">
                    </div>
            </div>
        </div>
    </div>
    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2>恭喜通關！ 🎉</h2>
            <p id="win-modal-text">你太棒了！</p>
            <button id="modal-close-btn" class="btn primary">返回大廳</button>
        </div>
    </div>
    <div id="all-clear-modal" class="modal">
        <div class="modal-content all-clear-style">
            <div class="trophy-icon">🏆</div>
            <h2>哇靠</h2>
            <h3>全關卡破關！</h3>
            <p></p>
            <p>太不可思議了！你成功成為真正的「自來水數位探險王」！快到服務台領取獎品吧！</p>
            <div class="apply-btn-wrapper">
                <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="btn apply-btn">立即申請用戶接管</a>
            </div>
            <p></p>
            <button id="all-clear-close-btn" class="btn gold-btn">點我關閉</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
